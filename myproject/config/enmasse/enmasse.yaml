    type: basic_auth
    username: postburn.globus.1
    password: postburn.globus.1
  - name: postburn.orchestrator.1.http.basic_auth
    is_active: True
    type: basic_auth
    username: postburn.orchestrator.1
    password: postburn.orchestrator.1
  - name: postburn.sentinel-2-l2a.1.http.basic_auth
    is_active: True
    type: basic_auth
    username: postburn.sentinel-2-l2a.1
    password: postburn.sentinel-2-l2a.1
  - name: postburn.test.1.http.basic_auth
    is_active: True
    type: basic_auth
    username: postburn.test.1
    password: postburn.test.1
  - name: postburn.test.2.http.basic_auth
